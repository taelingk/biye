# CardioFit 任务认领表
# 任何工具/人开始干活前先认领，干完打 done
# 发现 in_progress 就跳过，防止冲突
#
# 三端协作约定：
#   handler 字段: claude-code / codex / antigravity
#   多个工具可并行（标注 parallel），但不要同时改同一文件
#   开始前先 git pull，提交后 git push

tasks:
  - id: phase1-setup
    phase: 1
    name: 环境搭建
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    started: 2026-05-09
    completed: 2026-05-09
    files_touched:
      - AI_CONTEXT.md
      - .tasks.yaml
      - requirements-mac.txt
      - requirements-wsl.txt
      - configs/default.yaml
      - CLAUDE.md
      - README.md

  - id: phase2-preprocessing
    phase: 2
    name: 预处理管道
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on: phase1-setup
    files_touched:
      - src/cardiofit/preprocessing/
      - scripts/build_preprocessed_dataset.py

  - id: phase3-dataset
    phase: 3
    name: 数据加载管道
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on: phase2-preprocessing
    files_touched:
      - src/cardiofit/dataset/

  - id: phase4-model
    phase: 4
    name: 模型定义
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on: phase1-setup
    files_touched:
      - src/cardiofit/models/
    note: 与 Phase 3 无依赖冲突，可并行

  - id: phase5-training
    phase: 5
    name: 训练脚本
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on:
      - phase3-dataset
      - phase4-model
    files_touched:
      - src/cardiofit/training/
      - scripts/train_multimodal.py

  - id: phase6-evaluation
    phase: 6
    name: 评估管道
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on: phase5-training
    files_touched:
      - src/cardiofit/evaluation/
      - scripts/evaluate_multimodal.py

  - id: phase7-export
    phase: 7
    name: ONNX导出 + 文档
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    completed: 2026-05-09
    depends_on: phase6-evaluation
    files_touched:
      - scripts/export_onnx.py

  - id: phase8-verify
    phase: 8
    name: 验证代码可运行
    status: done
    handler: claude-code
    branch: feat/core-pipeline
    started: 2026-05-10
    completed: 2026-05-10
    depends_on:
      - phase5-training
      - phase6-evaluation
    files_touched:
      - tests/
      - scripts/verify_pipeline.py
      - src/cardiofit/utils/__init__.py
    note: 合成数据全管线测试通过。Mac CPU 模式可用，tensorflow-metal 不兼容已卸载

  - id: phase9-train
    phase: 9
    name: 真实数据训练
    status: done
    handler: windows-5090d
    branch: main
    started: 2026-06-02
    completed: 2026-06-02
    depends_on: phase8-verify
    files_touched:
      - data/
      - outputs/checkpoints/
      - outputs/logs/
      - outputs/evaluation/
      - outputs/onnx/
    note: Real-data training completed on Windows 5090D. Checkpoints, evaluation metrics, and ONNX export are available locally for Phase 10 tuning.

  - id: phase10-optimize
    phase: 10
    name: 模型优化 + 调参
    status: done
    handler: codex
    branch: main
    started: 2026-06-03
    completed: 2026-06-03
    depends_on: phase9-train
    files_touched:
      - configs/experiment/
      - outputs/
      - PHASE10_TUNING_ANALYSIS.md
    note: Windows 5090D ran regularized, low-lr, and no-augmentation Phase 10 experiments. All runs completed evaluation and ONNX export; artifacts packaged as phase10_artifacts.zip. No run beat Phase 9 CO RMSE.
